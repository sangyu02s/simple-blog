spring:
  application:
    name: simple-blog-backend
  datasource:
    url: jdbc:h2:mem:simpleblog;MODE=MySQL;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
    username: sa
    password:
    driver-class-name: org.h2.Driver
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
    properties:
      hibernate:
        format_sql: true
  flyway:
    enabled: true
  h2:
    console:
      enabled: true

server:
  port: 8080

app:
  security:
    jwt-secret: <SECRET>
    jwt-expiration-seconds: 86400
    allowed-origins:
      - http://localhost:5173
